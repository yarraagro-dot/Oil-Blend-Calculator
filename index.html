<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blend Calculator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f0efea; padding: 20px 16px 60px; color: #1a1a1a; }
h1 { font-size: 17px; font-weight: 600; margin-bottom: 2px; }
.sub { font-size: 12px; color: #999; margin-bottom: 20px; }
.card { background: #fff; border-radius: 16px; padding: 16px; margin-bottom: 12px; }
.lbl { font-size: 11px; font-weight: 600; color: #aaa; letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 10px; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.field-label { font-size: 12px; color: #888; margin-bottom: 5px; }
.inp {
  width: 100%; font-size: 22px; font-weight: 700; color: #1a1a1a;
  background: #f7f7f5; border: 2px solid #ebebeb; border-radius: 10px;
  padding: 12px 10px; outline: none;
  -webkit-appearance: none; appearance: none; font-family: inherit;
}
.pct-wrap { position: relative; }
.pct-wrap .inp { padding-right: 28px; }
.pct-sym { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 16px; color: #bbb; pointer-events: none; }
.calc-btn {
  display: block; width: 100%; margin-top: 14px;
  background: #1a1a1a; color: #fff; border: none; border-radius: 12px;
  padding: 17px; font-size: 15px; font-weight: 700;
  font-family: inherit; cursor: pointer;
}
.result-card { border-radius: 16px; padding: 20px 18px; margin-bottom: 12px; display: none; }
.r-label { font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 6px; }
.r-value { font-size: 42px; font-weight: 800; color: #fff; letter-spacing: -1px; }
.r-curr { font-size: 22px; font-weight: 500; color: rgba(255,255,255,0.5); }
.r-tag { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-top: 8px; color: rgba(255,255,255,0.6); }
.breakdown { display: none; }
.bk-row { display: flex; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid #f5f5f5; font-size: 14px; }
.bk-row:last-child { border-bottom: none; }
.bk-row span:first-child { color: #888; }
.bk-row span:last-child { font-weight: 600; }
</style>
</head>
<body>

<h1>Blend Price Calculator</h1>
<p class="sub">Sunflower &amp; Soybean oil blend</p>

<div class="card">
  <div class="lbl">Oil prices</div>
  <div class="row2">
    <div>
      <div class="field-label">Sunflower</div>
      <input class="inp" id="sf" type="number" inputmode="decimal" value="150" min="0">
    </div>
    <div>
      <div class="field-label">Soybean</div>
      <input class="inp" id="sb" type="number" inputmode="decimal" value="85" min="0">
    </div>
  </div>
</div>

<div class="card">
  <div class="lbl">Blend proportions</div>
  <div class="row2" style="align-items:start">
    <div>
      <div class="field-label">Sunflower %</div>
      <div class="pct-wrap">
        <input class="inp" id="sfp" type="number" inputmode="numeric" value="70" min="0" max="100">
        <span class="pct-sym">%</span>
      </div>
    </div>
    <div>
      <div class="field-label">Soybean %</div>
      <div class="pct-wrap">
        <input class="inp" id="sbp" type="number" inputmode="numeric" value="30" min="0" max="100">
        <span class="pct-sym">%</span>
      </div>
    </div>
  </div>
  <button class="calc-btn" onclick="calculate()">Calculate</button>
</div>

<div class="result-card" id="result-card">
  <div class="r-label">Landed Cost</div>
  <div class="r-value"><span class="r-curr">AUD </span><span id="out"></span></div>
  <div class="r-tag" id="r-tag"></div>
</div>

<div class="breakdown card" id="breakdown">
  <div class="lbl">Breakdown (INR)</div>
  <div class="bk-row"><span>Sunflower weighted ×5</span><span id="b1"></span></div>
  <div class="bk-row"><span>Soybean weighted ×5</span><span id="b2"></span></div>
  <div class="bk-row"><span>Combined</span><span id="b3"></span></div>
</div>

<script>
function calculate() {
  var sfv  = parseFloat(document.getElementById('sf').value)  || 0;
  var sbv  = parseFloat(document.getElementById('sb').value)  || 0;
  var sfpv = parseFloat(document.getElementById('sfp').value) || 0;
  var sbpv = parseFloat(document.getElementById('sbp').value) || 0;
  var w1   = sfv * (sfpv / 100);
  var w2   = sbv * (sbpv / 100);
  var sum  = w1 + w2;
  var val  = ((sum * 5) / 66) * 1.25;

  document.getElementById('out').innerHTML = val.toFixed(2);
  document.getElementById('b1').innerHTML  = (w1 * 5).toFixed(2);
  document.getElementById('b2').innerHTML  = (w2 * 5).toFixed(2);
  document.getElementById('b3').innerHTML  = (sum * 5).toFixed(2);

  var rc  = document.getElementById('result-card');
  var tag = document.getElementById('r-tag');

  rc.style.display = 'block';
  document.getElementById('breakdown').style.display = 'block';

  if (val > 10) {
    rc.style.background = '#b02020';
    tag.innerHTML = 'Above Target Price';
  } else {
    rc.style.background = '#1a7a3a';
    tag.innerHTML = 'Below Target Price';
  }
}
</script>
</body>
</html>
