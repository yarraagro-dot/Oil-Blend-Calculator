
<style>
.wrap { padding: 1rem 0 2rem; max-width: 500px; }
.title { font-size: 17px; font-weight: 500; color: var(--text-primary); margin-bottom: 2px; }
.sub { font-size: 12px; color: var(--text-muted); margin-bottom: 20px; }
.card { background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 10px; }
.sec { font-size: 10px; font-weight: 500; letter-spacing: 0.09em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.flabel { font-size: 12px; color: var(--text-secondary); margin-bottom: 5px; }
.finp {
  width: 100%; font-size: 22px; font-weight: 500; color: var(--text-primary);
  background: var(--surface-1); border: 1px solid var(--border);
  border-radius: 8px; padding: 11px 10px; outline: none;
  font-family: var(--font-sans); -webkit-appearance: none; appearance: none;
}
.pwrap { position: relative; }
.pwrap .finp { padding-right: 26px; }
.psym { position: absolute; right: 9px; top: 50%; transform: translateY(-50%); font-size: 14px; color: var(--text-muted); pointer-events: none; }

.slider-wrap { margin-top: 14px; padding-top: 12px; border-top: 0.5px solid var(--border); }
.slider-heads { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); margin-bottom: 8px; }
input[type=range] {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 4px; background: var(--border-strong);
  border-radius: 2px; outline: none; cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%;
  background: var(--text-primary); border: 3px solid var(--surface-2);
  box-shadow: 0 0 0 1.5px var(--border-strong);
}
input[type=range]::-moz-range-thumb {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--text-primary); border: 3px solid var(--surface-2);
}

.result { border-radius: 12px; padding: 18px 16px; margin-bottom: 10px; background: var(--surface-1); }
.rlabel { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px; }
.rval { font-size: 40px; font-weight: 500; letter-spacing: -1px; line-height: 1; color: var(--text-primary); }
.rcurr { font-size: 18px; color: var(--text-muted); margin-right: 3px; }
.rtag { font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; margin-top: 8px; }
.result.green { background: #1a7a3a; }
.result.green .rlabel, .result.green .rtag { color: rgba(255,255,255,0.55); }
.result.green .rval { color: #fff; }
.result.green .rcurr { color: rgba(255,255,255,0.5); }
.result.red { background: #b02020; }
.result.red .rlabel, .result.red .rtag { color: rgba(255,255,255,0.55); }
.result.red .rval { color: #fff; }
.result.red .rcurr { color: rgba(255,255,255,0.5); }

.brow { display: flex; justify-content: space-between; padding: 9px 0; border-bottom: 0.5px solid var(--border); font-size: 14px; }
.brow:last-child { border-bottom: none; }
.brow span:first-child { color: var(--text-secondary); }
.brow span:last-child { font-weight: 500; color: var(--text-primary); }
</style>

<div class="wrap">
  <div class="title">Blend price calculator</div>
  <div class="sub">Sunflower &amp; Soybean oil blend</div>

  <div class="card">
    <div class="sec">Oil prices</div>
    <div class="grid2">
      <div>
        <div class="flabel">Sunflower</div>
        <input class="finp" id="sf" type="number" inputmode="decimal" value="150" min="0" oninput="recalc()">
      </div>
      <div>
        <div class="flabel">Soybean</div>
        <input class="finp" id="sb" type="number" inputmode="decimal" value="85" min="0" oninput="recalc()">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="sec">Blend proportions</div>
    <div class="grid2">
      <div>
        <div class="flabel">Sunflower %</div>
        <div class="pwrap">
          <input class="finp" id="sfp" type="number" inputmode="numeric" value="70" min="0" max="100" oninput="syncFrom('sf')">
          <span class="psym">%</span>
        </div>
      </div>
      <div>
        <div class="flabel">Soybean %</div>
        <div class="pwrap">
          <input class="finp" id="sbp" type="number" inputmode="numeric" value="30" min="0" max="100" oninput="syncFrom('sb')">
          <span class="psym">%</span>
        </div>
      </div>
    </div>
    <div class="slider-wrap">
      <div class="slider-heads"><span>← Soybean</span><span>Sunflower →</span></div>
      <input type="range" id="sldr" min="0" max="100" value="70" step="1" oninput="syncFromSlider()">
    </div>
  </div>

  <div class="result" id="result">
    <div class="rlabel">Landed cost</div>
    <div class="rval"><span class="rcurr">AUD </span><span id="out">—</span></div>
    <div class="rtag" id="rtag"></div>
  </div>

  <div class="card">
    <div class="sec">Breakdown (INR)</div>
    <div class="brow"><span>Sunflower weighted ×5</span><span id="b1">—</span></div>
    <div class="brow"><span>Soybean weighted ×5</span><span id="b2">—</span></div>
    <div class="brow"><span>Combined</span><span id="b3">—</span></div>
  </div>
</div>

<script>
function recalc() {
  var sfv  = parseFloat(document.getElementById('sf').value)  || 0;
  var sbv  = parseFloat(document.getElementById('sb').value)  || 0;
  var sfpv = parseFloat(document.getElementById('sfp').value) || 0;
  var sbpv = parseFloat(document.getElementById('sbp').value) || 0;
  var w1  = sfv * (sfpv / 100);
  var w2  = sbv * (sbpv / 100);
  var sum = w1 + w2;
  var val = ((sum * 5) / 66) * 1.25;
  document.getElementById('out').innerHTML = val.toFixed(2);
  document.getElementById('b1').innerHTML  = (w1 * 5).toFixed(2);
  document.getElementById('b2').innerHTML  = (w2 * 5).toFixed(2);
  document.getElementById('b3').innerHTML  = (sum * 5).toFixed(2);
  var rc  = document.getElementById('result');
  var tag = document.getElementById('rtag');
  rc.className = 'result ' + (val > 10 ? 'red' : 'green');
  tag.innerHTML = val > 10 ? 'Above target price' : 'Below target price';
}

function syncFrom(changed) {
  var sfp = document.getElementById('sfp');
  var sbp = document.getElementById('sbp');
  var sldr = document.getElementById('sldr');
  if (changed === 'sf') {
    var v = parseFloat(sfp.value);
    if (!isNaN(v)) { v = Math.min(100, Math.max(0, Math.round(v))); sbp.value = 100 - v; sldr.value = v; }
  } else {
    var v = parseFloat(sbp.value);
    if (!isNaN(v)) { v = Math.min(100, Math.max(0, Math.round(v))); sfp.value = 100 - v; sldr.value = 100 - v; }
  }
  recalc();
}

function syncFromSlider() {
  var v = parseInt(document.getElementById('sldr').value);
  document.getElementById('sfp').value = v;
  document.getElementById('sbp').value = 100 - v;
  recalc();
}

recalc();
</script>
